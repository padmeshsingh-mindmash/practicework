<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=zx .;;, initial-scale=1.0" />
    <title>Feedback Form</title>
  </head>
  <body>
    <h1>Feedback Form</h1>
    <form action="/submit" method="post">
      <label for="name">Full Name:</label><br />
      <input
        type="text"
        id="name"
        placeholder="Jack Peter"
        required
      /><br /><br />
      <label for="email">Email Address:</label><br />
      <input
        type="email"
        id="email"
        placeholder="jack123@gmail.com"
        required
      /><br /><br />
      <p>Please rate your experience (upto 5) :</p>
      <input type="radio" id="1" name="rating" value="1" />
      <label for="1">1</label>
      <input type="radio" id="2" name="rating" value="2" />
      <label for="2">2</label>
      <input type="radio" id="3" name="rating" value="3" />
      <label for="3">3</label>
      <input type="radio" id="4" name="rating" value="4" />
      <label for="4">4</label>
      <input type="radio" id="5" name="rating" value="5" />
      <label for="5">5</label> <br /><br />
      <label for="feedback">Feedback Message:</label><br />
      <textarea
        id="feedback"
        placeholder="Enter Your Feedback..."
        rows="5"
        cols="30"
        maxlength="300"
      ></textarea
      ><br /><br />
      <input type="submit" value="Submit Feedback" />
    </form>
  </body>
</html>
